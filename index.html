    position:fixed; inset:0; z-index:400; pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 42%, rgba(10,27,36,0) 55%, rgba(10,27,36,.55) 100%),
      linear-gradient(rgba(18,50,64,.14), rgba(18,50,64,.14));
    mix-blend-mode:normal;
  }

  .leaflet-container{ font-family:'Josefin Sans',sans-serif; }
  .leaflet-control-attribution{
    background:rgba(10,27,36,.55)!important; color:var(--mist)!important;
    font-size:9px; letter-spacing:.02em;
  }
  .leaflet-control-attribution a{ color:var(--mist)!important; }
  .leaflet-control-zoom a{
    background:rgba(18,50,64,.85)!important; color:var(--champagne)!important;
    border:1px solid rgba(211,174,107,.35)!important;
  }

  /* ---------- Chart annotations (sea names) ---------- */
  .sea-label{
    color:rgba(242,232,213,.34);
    font-family:'Josefin Sans',sans-serif; font-weight:300;
    letter-spacing:.55em; text-transform:uppercase; font-size:11px;
    white-space:nowrap; text-shadow:0 1px 6px rgba(0,0,0,.4);
  }

  .land-label{
    color:rgba(242,232,213,.5);
    font-family:'Josefin Sans',sans-serif; font-weight:400;
    letter-spacing:.34em; text-transform:uppercase; font-size:10px;
    white-space:nowrap; text-shadow:0 1px 6px rgba(0,0,0,.5);
  }

  /* ---------- Port markers ---------- */
  .port-dot{ position:relative; width:100%; height:100%; }
  .port-dot .ring{
    position:absolute; inset:0; border-radius:50%;
    border:1.5px solid var(--gold);
    box-shadow:0 0 12px rgba(211,174,107,.45), inset 0 0 6px rgba(211,174,107,.25);
    background:rgba(10,27,36,.75);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .port-dot .core{
    position:absolute; left:50%; top:50%; width:6px; height:6px;
    transform:translate(-50%,-50%); border-radius:50%; background:var(--gold);
  }
  .port-dot.visited .ring{ background:rgba(211,174,107,.22); }
  .port-dot.active .ring{
    transform:scale(1.35);
    box-shadow:0 0 22px rgba(211,174,107,.8), inset 0 0 10px rgba(211,174,107,.4);
  }
  .leaflet-marker-icon:hover .port-dot .ring{ transform:scale(1.3); }

  .port-name{
    color:var(--champagne); font-size:11.5px; font-weight:400;
    letter-spacing:.28em; text-transform:uppercase; white-space:nowrap;
    text-shadow:0 1px 8px rgba(0,0,0,.75);
  }

  /* Birthday star (at sea, 12 Dec) */
  .bday-star{ position:relative; width:100%; height:100%; }
  .bday-star svg{ overflow:visible; display:block; }
  .bday-star .halo{
    position:absolute; inset:-8px; border-radius:50%;
    background:radial-gradient(circle, rgba(224,121,106,.35), transparent 70%);
    animation:halo 3.2s ease-in-out infinite;
  }
  @keyframes halo{ 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.25);opacity:1} }

  /* ---------- The ship ---------- */
  .ship-wrap{ position:relative; width:100%; height:100%; }
  .ship-rot{ position:absolute; inset:0; transform-origin:50% 50%; }
  .ship-bob{ position:absolute; inset:0; animation:bob 3.4s ease-in-out infinite; }
  @keyframes bob{
    0%,100%{ transform:translateY(0) rotate(-1.6deg); }
    50%    { transform:translateY(-3px) rotate(1.6deg); }
  }
  .ship-bob svg{ display:block; filter:drop-shadow(0 0 10px rgba(211,174,107,.55)); }
  .wake{
    position:absolute; left:50%; top:78%; width:4px; height:26px;
    transform:translateX(-50%);
    background:linear-gradient(rgba(242,232,213,.5), transparent);
    border-radius:2px; animation:wake 1.6s ease-in-out infinite;
  }
  @keyframes wake{ 0%,100%{opacity:.55; height:26px} 50%{opacity:.25; height:34px} }

  /* ---------- Tooltips ---------- */
  .leaflet-tooltip.chart-tip{
    background:linear-gradient(160deg, rgba(18,50,64,.96), rgba(10,27,36,.96));
    border:1px solid rgba(211,174,107,.5); border-radius:2px;
    box-shadow:0 12px 40px rgba(0,0,0,.55);
    color:var(--champagne); padding:14px 18px 12px;
    font-family:'Josefin Sans',sans-serif;
  }
  .leaflet-tooltip.chart-tip::before{ border-top-color:rgba(211,174,107,.5); }
  .tip-day{
    font-size:9.5px; letter-spacing:.4em; text-transform:uppercase;
    color:var(--gold); margin-bottom:4px;
  }
  .tip-port{
    font-family:'Italiana',serif; font-size:21px; letter-spacing:.04em; line-height:1.1;
  }
  .tip-sub{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:14.5px; color:var(--mist); margin-top:4px;
  }
  .tip-note{
    margin-top:7px; padding-top:7px; border-top:1px solid rgba(211,174,107,.25);
    font-size:11px; letter-spacing:.08em; color:var(--champagne);
  }
  .tip-note.coral{ color:var(--coral); letter-spacing:.14em; }

  /* ---------- Voyage panel ---------- */
  .panel{
    position:fixed; z-index:600; top:24px; left:24px; width:330px;
    max-height:calc(100% - 48px); display:flex; flex-direction:column;
    background:linear-gradient(170deg, rgba(18,50,64,.88), rgba(10,27,36,.92));
    border:1px solid rgba(211,174,107,.35); border-radius:3px;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:0 24px 70px rgba(0,0,0,.5);
  }
  .panel-head{ padding:26px 26px 18px; border-bottom:1px solid rgba(211,174,107,.22); }
  .eyebrow{
    font-size:9.5px; letter-spacing:.5em; text-transform:uppercase;
    color:var(--gold); margin-bottom:10px;
  }
  h1{
    font-family:'Italiana',serif; font-weight:400;
    font-size:34px; line-height:1.05; letter-spacing:.02em;
  }
  h1 em{
    font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.62em;
    color:var(--mist); display:block; margin-top:6px; letter-spacing:.03em;
  }
  .voyage-meta{
    margin-top:12px; font-size:10.5px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--mist); line-height:1.9;
  }
  .voyage-meta b{ color:var(--champagne); font-weight:400; }

  /* Timeline */
  .timeline{ overflow-y:auto; padding:10px 8px 14px 0; scrollbar-width:thin; scrollbar-color:rgba(211,174,107,.35) transparent; }
  .stop{
    display:flex; gap:14px; padding:11px 18px 11px 26px; cursor:pointer;
    border-left:2px solid transparent; transition:background .2s ease, border-color .2s ease;
    background:transparent; border-top:0; border-right:0; border-bottom:0;
    width:100%; text-align:left; color:inherit; font:inherit;
  }
  .stop:hover{ background:rgba(211,174,107,.07); }
  .stop:focus-visible{ outline:2px solid var(--gold); outline-offset:-2px; }
  .stop.active{ background:rgba(211,174,107,.12); border-left-color:var(--gold); }
  .stop .rail{ display:flex; flex-direction:column; align-items:center; padding-top:3px; }
  .stop .node{
    width:9px; height:9px; border-radius:50%;
    border:1.5px solid var(--gold-soft); background:transparent; flex:none;
    transition:background .25s ease;
  }
  .stop.visited .node, .stop.active .node{ background:var(--gold); border-color:var(--gold); }
  .stop .thread{ width:1px; flex:1; margin-top:4px; background:rgba(211,174,107,.25); }
  .stop:last-child .thread{ display:none; }
  .stop .node.star{ border-radius:0; border:0; width:11px; height:11px; background:transparent; position:relative; }
  .stop .node.star::before{
    content:'★'; position:absolute; inset:0; color:var(--coral);
    font-size:12px; line-height:11px;
  }
  .stop-day{ font-size:9px; letter-spacing:.32em; text-transform:uppercase; color:var(--gold); margin-bottom:3px; }
  .stop-name{ font-family:'Italiana',serif; font-size:17.5px; letter-spacing:.03em; }
  .stop-time{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:13.5px; color:var(--mist); margin-top:2px;
  }
  .stop-flag{ font-size:10px; letter-spacing:.16em; color:var(--coral); margin-top:3px; text-transform:uppercase; }

  /* ---------- Helm (controls) ---------- */
  .helm{
    position:fixed; z-index:600; left:50%; bottom:26px; transform:translateX(-50%);
    display:flex; align-items:center; gap:18px;
    background:linear-gradient(170deg, rgba(18,50,64,.9), rgba(10,27,36,.94));
    border:1px solid rgba(211,174,107,.35); border-radius:60px;
    padding:10px 22px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:0 18px 50px rgba(0,0,0,.5);
  }
  .helm button{
    background:none; border:1px solid rgba(211,174,107,.45); color:var(--gold);
    width:38px; height:38px; border-radius:50%; cursor:pointer;
    display:grid; place-items:center; transition:all .2s ease; font-size:0;
  }
  .helm button:hover{ background:rgba(211,174,107,.15); box-shadow:0 0 14px rgba(211,174,107,.35); }
  .helm button:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .helm button svg{ width:15px; height:15px; fill:var(--gold); }
  .helm .play{ width:48px; height:48px; border-width:1.5px; }
  .helm .play svg{ width:18px; height:18px; }
  .helm-dots{ display:flex; gap:8px; padding:0 4px; }
  .helm-dots i{
    width:6px; height:6px; border-radius:50%; background:rgba(211,174,107,.3);
    transition:all .25s ease;
  }
  .helm-dots i.on{ background:var(--gold); box-shadow:0 0 8px rgba(211,174,107,.7); }
  .helm-label{
    min-width:118px; text-align:center; font-size:9.5px; letter-spacing:.3em;
    text-transform:uppercase; color:var(--mist);
  }
  .helm-label b{ display:block; color:var(--champagne); font-weight:400; font-size:11px; margin-top:2px; letter-spacing:.24em; }

  /* Compass rose */
  .compass{ position:fixed; right:26px; bottom:34px; z-index:500; opacity:.75; pointer-events:none; }

  /* ---------- Responsive ---------- */
  @media (max-width:760px){
    .panel{ top:12px; left:12px; right:12px; width:auto; max-height:44%; }
    .panel-head{ padding:18px 18px 12px; }
    h1{ font-size:26px; }
    .helm{ bottom:14px; padding:8px 14px; gap:12px; max-width:calc(100% - 24px); }
    .helm-label{ min-width:86px; }
    .helm-dots{ display:none; }
    .compass{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .ship-bob, .wake, .bday-star .halo{ animation:none !important; }
  }
</style>
</head>
<body>

<div id="map" role="application" aria-label="Interactive map of Veronika's birthday cruise route"></div>
<div class="map-veil"></div>

<aside class="panel" aria-label="Voyage itinerary">
  <div class="panel-head">
    <div class="eyebrow">By Invitation · A Diamond Jubilee at Sea</div>
    <h1>Veronika at Sixty<em>the South Pacific voyage</em></h1>
    <div class="voyage-meta">
      <b>Anthem of the Seas</b> · Royal Caribbean<br/>
      Sydney → Nouméa → Port Vila → Mystery&nbsp;Island → Sydney<br/>
      11 – 19 December 2026 · 8 nights
    </div>
  </div>
  <nav class="timeline" id="timeline" aria-label="Ports of call"></nav>
</aside>

<div class="helm" role="group" aria-label="Voyage playback controls">
  <button id="prevBtn" aria-label="Previous stop" title="Previous stop">
    <svg viewBox="0 0 24 24"><path d="M15.5 4.5v15L6.5 12z"/></svg>
  </button>
  <button id="playBtn" class="play" aria-label="Play voyage" title="Play / pause the voyage">
    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <button id="nextBtn" aria-label="Next stop" title="Next stop">
    <svg viewBox="0 0 24 24"><path d="M8.5 4.5v15l9-7.5z"/></svg>
  </button>
  <div class="helm-dots" id="helmDots" aria-hidden="true"></div>
  <div class="helm-label" id="helmLabel" aria-live="polite">
    Now<br/><b>Sydney</b>
  </div>
</div>

<svg class="compass" width="82" height="82" viewBox="0 0 100 100" aria-hidden="true">
  <g fill="none" stroke="#d3ae6b" stroke-width="1" opacity=".9">
    <circle cx="50" cy="50" r="40" opacity=".5"/>
    <circle cx="50" cy="50" r="30" opacity=".3"/>
    <path d="M50 8 L55 45 L50 50 L45 45 Z" fill="#d3ae6b" stroke="none"/>
    <path d="M50 92 L55 55 L50 50 L45 55 Z" fill="none"/>
    <path d="M8 50 L45 45 L50 50 L45 55 Z" fill="none"/>
    <path d="M92 50 L55 45 L50 50 L55 55 Z" fill="none"/>
  </g>
  <text x="50" y="5.5" text-anchor="middle" fill="#f2e8d5" font-size="9" font-family="Josefin Sans, sans-serif" letter-spacing="2">N</text>
</svg>

<!-- Leaflet 1.9.4 JS, inlined (BSD-2 © Vladimir Agafonkin) -->

16.224],[179.63,-16.259],[179.656,-16.217],[179.702,-16.223],[179.764,-16.181],[179.781,-16.231],[179.829,-16.204],[179.841,-16.213],[179.829,-16.224],[179.856,-16.231],[179.911,-16.18],[180.0,-16.149],[180.0,-16.169],[179.858,-16.283]]]}},{"type":"Feature","properties":{},"geometry":{"type":"Polygon","coordinates":[[[180.0,-16.541],[179.984,-16.53],[180.0,-16.49],[180.0,-16.541]]]}},{"type":"Feature","properties":{},"geometry":{"type":"Polygon","coordinates":[[[179.39,-16.334],[179.344,-16.339],[179.328,-16.327],[179.362,-16.327],[179.39,-16.334]]]}},{"type":"Feature","properties":{},"geometry":{"type":"Polygon","coordinates":[[[177.006,-12.49],[177.06,-12.475],[177.111,-12.481],[177.129,-12.502],[177.073,-12.517],[177.011,-12.509],[177.006,-12.49]]]}},{"type":"Feature","properties":{},"geometry":{"type":"Polygon","coordinates":[[[179.218,-8.521],[179.191,-8.542],[179.199,-8.461],[179.207,-8.498],[179.218,-8.521]]]}}]};</script>
<script>
(function(){
  'use strict';
  var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ============ Itinerary data ============ */
  var PORTS = {
    sydney:   [-33.8568, 151.2153],
    noumea:   [-22.2735, 166.4481],
    portvila: [-17.7404, 168.3210],
    mystery:  [-20.2427, 169.7770]
  };

  // Ordered stops. Sea days sit at a fraction along their sailing leg.
  var STOPS = [
    { id:'syd-out',  name:'Sydney',            sub:'Australia',            day:'Day 1 · Fri 11 Dec',        time:'Departs 5:00 pm',            kind:'port', ll:PORTS.sydney },
    { id:'sea-1',    name:'At Sea',             sub:'the Coral Sea',        day:'Days 2–3 · Sat 12 – Sun 13 Dec', time:'Anthem of the Seas',    kind:'sea',  flag:'★ Veronika turns 60 · 12 Dec' },
    { id:'noumea',   name:'Nouméa',             sub:'New Caledonia',        day:'Day 4 · Mon 14 Dec',        time:'Docked · 7:00 am – 2:00 pm',  kind:'port', ll:PORTS.noumea },
    { id:'portvila', name:'Port Vila',          sub:'Vanuatu',              day:'Day 5 · Tue 15 Dec',        time:'Tendered · 8:00 am – 5:00 pm', kind:'port', ll:PORTS.portvila },
    { id:'mystery',  name:'Mystery Island',     sub:'Vanuatu',              day:'Day 6 · Wed 16 Dec',        time:'Tendered · 7:00 am – 3:00 pm', kind:'port', ll:PORTS.mystery },
    { id:'sea-2',    name:'At Sea',             sub:'homeward, the Tasman', day:'Days 7–8 · Thu 17 – Fri 18 Dec', time:'Anthem of the Seas',   kind:'sea' },
    { id:'syd-in',   name:'Sydney',             sub:'Australia',            day:'Day 9 · Sat 19 Dec',        time:'Arrives 6:30 am',             kind:'port', ll:PORTS.sydney }
  ];

  /* ============ Map ============ */
  var map = L.map('map', {
    zoomControl:true, attributionControl:true,
    minZoom:4, maxZoom:7, zoomSnap:0.25,
    worldCopyJump:false
  });
  map.zoomControl.setPosition('topright');

  map.attributionControl.setPrefix(false);
  map.attributionControl.addAttribution('Coastlines: Natural Earth (public domain)');

  /* Graticule — faint 5° chart lines */
  (function(){
    var lines = [];
    for (var lat=-45; lat<=-5; lat+=5) lines.push([[lat,139],[lat,186]]);
    for (var lng=140; lng<=185; lng+=5) lines.push([[-48,lng],[-3,lng]]);
    L.polyline(lines, { color:'rgba(242,232,213,.06)', weight:1, interactive:false }).addTo(map);
  })();

  /* Embedded coastlines: soft shoal glow beneath, engraved land above */
  L.geoJSON(LAND, {
    interactive:false,
    style:{ color:'rgba(160,200,206,.14)', weight:6, fill:false }
  }).addTo(map);
  L.geoJSON(LAND, {
    interactive:false,
    style:{ color:'rgba(214,234,235,.62)', weight:1,
            fillColor:'#20444f', fillOpacity:1 }
  }).addTo(map);

  function fitVoyage(){
    var mobile = window.innerWidth <= 760;
    map.fitBounds([[-37.2, 147.0], [-14.5, 173.5]], mobile
      ? { paddingTopLeft:[12, Math.round(window.innerHeight*0.46)], paddingBottomRight:[12, 86] }
      : { paddingTopLeft:[382, 28], paddingBottomRight:[28, 96] });
  }
  fitVoyage();
  var fitTimer = null;
  window.addEventListener('resize', function(){
    clearTimeout(fitTimer); fitTimer = setTimeout(fitVoyage, 250);
  });

  /* Sea-name annotations, like a chart */
  [
    ['CORAL SEA',   -25.6, 158.6, 'sea-label'],
    ['TASMAN SEA',  -34.6, 159.9, 'sea-label'],
    ['SOUTH PACIFIC OCEAN', -19.6, 174.3, 'sea-label'],
    ['AUSTRALIA',   -29.3, 145.9, 'land-label'],
    ['NEW CALEDONIA', -20.1, 164.1, 'land-label'],
    ['VANUATU',     -16.1, 166.0, 'land-label'],
    ['FIJI',        -16.5, 177.9, 'land-label'],
    ['NORFOLK ISLAND', -29.9, 167.95, 'land-label'],
    ['NEW ZEALAND', -37.3, 174.4, 'land-label']
  ].forEach(function(s){
    L.marker([s[1], s[2]], {
      interactive:false,
      icon:L.divIcon({ className:'', html:'<div class="'+s[3]+'">'+s[0]+'</div>', iconSize:[0,0], iconAnchor:[0,0] })
    }).addTo(map);
  });

  /* ============ Route geometry ============ */
  // Gentle arcs between ports (quadratic bézier, control point offset perpendicular to the chord)
  function arc(a, b, bend, n){
    n = n || 140;
    var pts = [];
    var mx = (a[0]+b[0])/2, my = (a[1]+b[1])/2;
    var dx = b[0]-a[0], dy = b[1]-a[1];
    var len = Math.sqrt(dx*dx + dy*dy) || 1;
    var cx = mx + (-dy/len)*bend, cy = my + (dx/len)*bend;
    for(var i=0;i<=n;i++){
      var t=i/n, u=1-t;
      pts.push([ u*u*a[0] + 2*u*t*cx + t*t*b[0],
                 u*u*a[1] + 2*u*t*cy + t*t*b[1] ]);
    }
    return pts;
  }

  var legs = [
    arc(PORTS.sydney,   PORTS.noumea,   -0.85),  // out across the Coral Sea
    arc(PORTS.noumea,   PORTS.portvila, -0.35),
    arc(PORTS.portvila, PORTS.mystery,   0.35),
    arc(PORTS.mystery,  PORTS.sydney,   -1.0)   // the long run home
  ];

  // Flatten to one path; record index where each STOP sits on the path
  var path = [];
  legs.forEach(function(leg, i){
    var pts = (i === 0) ? leg : leg.slice(1);
    path = path.concat(pts);
  });
  var legStart = [0];
  for (var li=1; li<legs.length; li++) legStart.push(legStart[li-1] + legs[li-1].length - 1);
  var pathEnd = path.length - 1;

  function legPoint(legIdx, frac){
    var start = legStart[legIdx];
    var len = legs[legIdx].length - 1;
    return start + Math.round(len * frac);
  }

  var stopIndex = {
    'syd-out':  0,
    'sea-1':    legPoint(0, 0.52),
    'noumea':   legPoint(1, 0),
    'portvila': legPoint(2, 0),
    'mystery':  legPoint(3, 0),
    'sea-2':    legPoint(3, 0.52),
    'syd-in':   pathEnd
  };
  STOPS.forEach(function(s){
    s.pathIdx = stopIndex[s.id];
    if (!s.ll) s.ll = path[s.pathIdx];
  });

  /* Route lines: faint dotted "planned course" + solid gold "sailed" */
  L.polyline(path, {
    color:'#d3ae6b', weight:1.4, opacity:0.4, dashArray:'2 7', interactive:false
  }).addTo(map);

  var sailed = L.polyline([path[0]], {
    color:'#d3ae6b', weight:2.2, opacity:0.95, interactive:false,
    lineCap:'round'
  }).addTo(map);

  /* ============ Markers ============ */
  function tipHTML(s){
    return '<div class="tip-day">'+s.day+'</div>'
         + '<div class="tip-port">'+s.name+'</div>'
         + '<div class="tip-sub">'+s.sub+'</div>'
         + '<div class="tip-note'+(s.flag?' coral':'')+'">'+(s.flag ? s.flag : s.time)+'</div>';
  }

  var markers = {};
  STOPS.forEach(function(s){
    if (s.id === 'syd-in') return; // shares Sydney's marker

    var icon, labelOffset;
    if (s.kind === 'sea' && s.flag){
      icon = L.divIcon({
        className:'', iconSize:[26,26], iconAnchor:[13,13],
        html:'<div class="bday-star"><div class="halo"></div>'
            +'<svg width="26" height="26" viewBox="0 0 26 26">'
            +'<path d="M13 1.5 L15.9 9.6 L24.5 9.9 L17.7 15.2 L20.1 23.5 L13 18.6 L5.9 23.5 L8.3 15.2 L1.5 9.9 L10.1 9.6 Z" '
            +'fill="#e0796a" stroke="#f2e8d5" stroke-width="0.8"/></svg></div>'
      });
    } else if (s.kind === 'sea'){
      icon = L.divIcon({
        className:'', iconSize:[14,14], iconAnchor:[7,7],
        html:'<div class="port-dot" data-stop="'+s.id+'"><div class="ring" style="border-style:dashed"></div></div>'
      });
    } else {
      icon = L.divIcon({
        className:'', iconSize:[18,18], iconAnchor:[9,9],
        html:'<div class="port-dot" data-stop="'+s.id+'"><div class="ring"></div><div class="core"></div></div>'
      });
    }

    var m = L.marker(s.ll, { icon:icon, keyboard:true, title:s.name }).addTo(map);
    m.bindTooltip(tipHTML(s), {
      className:'chart-tip', direction:'top', offset:[0,-14], opacity:1, sticky:false
    });
    m.on('click', function(){ goToStop(STOPS.indexOf(s), true); });
    markers[s.id] = m;

    if (s.kind === 'port'){
      var side = (s.id === 'syd-out') ? 'right' : 'right';
      L.marker(s.ll, {
        interactive:false,
        icon:L.divIcon({
          className:'', iconSize:[0,0], iconAnchor: [-14, 6],
          html:'<div class="port-name">'+s.name+'</div>'
        })
      }).addTo(map);
    }
  });

  // Sydney tooltip covers both call-ins
  markers['syd-out'].setTooltipContent(
    '<div class="tip-day">Day 1 · Fri 11 Dec &nbsp;/&nbsp; Day 9 · Sat 19 Dec</div>'
   +'<div class="tip-port">Sydney</div>'
   +'<div class="tip-sub">Australia · home port</div>'
   +'<div class="tip-note">Departs 5:00 pm · Returns 6:30 am</div>'
  );

  /* ============ The ship ============ */
  var SHIP_SVG =
    '<svg width="34" height="34" viewBox="0 0 34 34">'
   +'<g transform="translate(17,17)">'
   +  '<path d="M0,-13 C5,-7 5.5,3 4,11 L-4,11 C-5.5,3 -5,-7 0,-13 Z" '
   +        'fill="#0a1b24" stroke="#d3ae6b" stroke-width="1.6"/>'
   +  '<path d="M0,-9.5 C2.8,-5.5 3,1 2.2,7.5 L-2.2,7.5 C-3,1 -2.8,-5.5 0,-9.5 Z" fill="#d3ae6b" opacity=".9"/>'
   +  '<circle cx="0" cy="-2" r="1.3" fill="#0a1b24"/>'
   +  '<circle cx="0" cy="2.6" r="1.3" fill="#0a1b24"/>'
   +'</g></svg>';

  var shipIcon = L.divIcon({
    className:'', iconSize:[34,34], iconAnchor:[17,17],
    html:'<div class="ship-wrap"><div class="ship-rot" id="shipRot"><div class="ship-bob">'+SHIP_SVG+'<div class="wake"></div></div></div></div>'
  });
  var ship = L.marker(path[0], { icon:shipIcon, interactive:false, zIndexOffset:1000 }).addTo(map);
  var shipRotEl = null;

  function bearing(a, b){
    var dLng = (b[1]-a[1]) * Math.PI/180;
    var la1 = a[0]*Math.PI/180, la2 = b[0]*Math.PI/180;
    var y = Math.sin(dLng)*Math.cos(la2);
    var x = Math.cos(la1)*Math.sin(la2) - Math.sin(la1)*Math.cos(la2)*Math.cos(dLng);
    return Math.atan2(y,x) * 180/Math.PI;
  }
  function setShip(idx){
    idx = Math.max(0, Math.min(pathEnd, idx));
    ship.setLatLng(path[idx]);
    if (!shipRotEl) shipRotEl = document.getElementById('shipRot');
    if (shipRotEl){
      var ahead = path[Math.min(pathEnd, idx+2)];
      var behind = path[Math.max(0, idx-2)];
      shipRotEl.style.transform = 'rotate(' + bearing(behind, ahead).toFixed(1) + 'deg)';
    }
    sailed.setLatLngs(path.slice(0, idx+1).concat([path[idx]]));
  }

  /* ============ Timeline panel ============ */
  var timelineEl = document.getElementById('timeline');
  STOPS.forEach(function(s, i){
    var btn = document.createElement('button');
    btn.className = 'stop'; btn.type = 'button';
    btn.setAttribute('data-i', i);
    btn.innerHTML =
      '<span class="rail"><span class="node'+(s.flag?' star':'')+'"></span><span class="thread"></span></span>'
     +'<span class="body">'
     +  '<span class="stop-day">'+s.day+'</span>'
     +  '<span class="stop-name" style="display:block">'+s.name+'</span>'
     +  '<span class="stop-time" style="display:block">'+s.time+'</span>'
     +  (s.flag ? '<span class="stop-flag" style="display:block">'+s.flag+'</span>' : '')
     +'</span>';
    btn.addEventListener('click', function(){ goToStop(i, true); });
    timelineEl.appendChild(btn);
  });
  var stopBtns = timelineEl.querySelectorAll('.stop');

  var dotsEl = document.getElementById('helmDots');
  STOPS.forEach(function(){ dotsEl.appendChild(document.createElement('i')); });
  var dots = dotsEl.querySelectorAll('i');
  var helmLabel = document.getElementById('helmLabel');

  /* ============ State & animation ============ */
  var current = 0;          // current stop index
  var animFrame = null;
  var playing = false;
  var playTimer = null;

  var playBtn = document.getElementById('playBtn');
  var playIcon = document.getElementById('playIcon');
  var ICON_PLAY = 'M8 5v14l11-7z';
  var ICON_PAUSE = 'M7 5h4v14H7zM13 5h4v14h-4z';

  function refreshUI(){
    var s = STOPS[current];
    stopBtns.forEach(function(b, i){
      b.classList.toggle('active', i === current);
      b.classList.toggle('visited', i < current);
    });
    dots.forEach(function(d, i){ d.classList.toggle('on', i <= current); });
    helmLabel.innerHTML = (current === STOPS.length-1 ? 'Home' : 'Now') + '<br/><b>' + s.name + '</b>';
    Object.keys(markers).forEach(function(id){
      var el = markers[id].getElement();
      if (!el) return;
      var dot = el.querySelector('.port-dot');
      if (!dot) return;
      var idx = STOPS.findIndex(function(x){ return x.id === id; });
      dot.classList.toggle('active', id === s.id || (s.id==='syd-in' && id==='syd-out'));
      dot.classList.toggle('visited', idx > -1 && idx < current);
    });
    var active = stopBtns[current];
    if (active && active.scrollIntoView) active.scrollIntoView({ block:'nearest', behavior:'smooth' });
  }

  function showTip(i){
    var s = STOPS[i];
    var m = markers[s.id] || markers['syd-out'];
    if (m){ m.openTooltip(); setTimeout(function(){ m.closeTooltip(); }, 2400); }
  }

  function cancelAnim(){
    if (animFrame){ cancelAnimationFrame(animFrame); animFrame = null; }
    if (playTimer){ clearTimeout(playTimer); playTimer = null; }
  }

  // Sail from stop a → b over `dur` ms
  function sail(a, b, dur, done){
    var from = STOPS[a].pathIdx, to = STOPS[b].pathIdx;
    if (prefersReducedMotion){ setShip(to); if (done) done(); return; }
    var t0 = null;
    function step(ts){
      if (!t0) t0 = ts;
      var t = Math.min(1, (ts - t0)/dur);
      var e = t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;   // easeInOutQuad
      setShip(Math.round(from + (to-from)*e));
      if (t < 1){ animFrame = requestAnimationFrame(step); }
      else { animFrame = null; if (done) done(); }
    }
    animFrame = requestAnimationFrame(step);
  }

  function goToStop(i, userInitiated){
    if (userInitiated) stopPlaying();
    cancelAnim();
    var prev = current;
    current = Math.max(0, Math.min(STOPS.length-1, i));
    refreshUI();
    if (Math.abs(current-prev) === 1 && !prefersReducedMotion){
      sail(prev, current, 1400, function(){ showTip(current); });
    } else {
      setShip(STOPS[current].pathIdx);
      showTip(current);
    }
  }

  function stopPlaying(){
    playing = false;
    cancelAnim();
    playIcon.querySelector('path').setAttribute('d', ICON_PLAY);
    playBtn.setAttribute('aria-label','Play voyage');
  }

  function playLeg(){
    if (!playing) return;
    var next = current + 1;
    if (next >= STOPS.length){
      // loop: quietly reset to Sydney, breathe, then set off again
      current = 0; setShip(0); refreshUI();
      playTimer = setTimeout(playLeg, 1800);
      return;
    }
    var span = Math.abs(STOPS[next].pathIdx - STOPS[current].pathIdx);
    var dur = Math.max(2200, Math.min(7000, span * 26));  // slow, stately pace
    sail(current, next, dur, function(){
      current = next; refreshUI(); showTip(current);
      playTimer = setTimeout(playLeg, 2600);              // linger at each call
    });
  }

  playBtn.addEventListener('click', function(){
    if (playing){ stopPlaying(); return; }
    playing = true;
    playIcon.querySelector('path').setAttribute('d', ICON_PAUSE);
    playBtn.setAttribute('aria-label','Pause voyage');
    if (current >= STOPS.length-1){ current = 0; setShip(0); refreshUI(); }
    playLeg();
  });
  document.getElementById('prevBtn').addEventListener('click', function(){ goToStop(current-1, true); });
  document.getElementById('nextBtn').addEventListener('click', function(){ goToStop(current+1, true); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowRight'){ goToStop(current+1, true); }
    else if (e.key === 'ArrowLeft'){ goToStop(current-1, true); }
    else if (e.key === ' ' && document.activeElement === document.body){ e.preventDefault(); playBtn.click(); }
  });

  /* ============ Launch ============ */
  setShip(0);
  refreshUI();
  if (!prefersReducedMotion){
    setTimeout(function(){ playBtn.click(); }, 1600);   // set sail on arrival
  }
})();
</script>
